services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  chatbot-ai-service:
    build:
      context: ./chatbot-ai-service
    image: chatbot-ai-service:latest
    env_file:
      - ./chatbot-ai-service/.env
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatbot-be:
    build:
      context: ./chatbot-be
    image: chatbot-be:latest
    env_file:
      - ./chatbot-be/.env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://chatbot-ai-service:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chatbot-ai-service:
        condition: service_healthy

volumes:
  postgres_data:
